<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل دخول الأدمن</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Cairo',sans-serif;
  margin:0;
  background:linear-gradient(#f6f1eb,#efe6dc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#fff;
  padding:30px;
  border-radius:20px;
  width:320px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  text-align:center;
}

h1{
  margin-bottom:20px;
  color:#4b2f1f;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ddd;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#4b2f1f;
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.error{
  color:red;
  margin-top:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="box">
  <h1>دخول الأدمن</h1>

  <input type="text" id="user" placeholder="اسم المستخدم">
  <input type="password" id="pass" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>

  <div class="error" id="error"></div>
</div>

<script>
function login(){
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === "admin" && pass === "123"){
    window.location.href = "admin.html";
  }else{
    document.getElementById("error").innerText = "بيانات الدخول غير صحيحة";
  }
}
</script>

</body>
</html>
